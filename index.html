<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GIFU SCOUT — 岐阜市の土地を、地図から読む</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{--ink:#16221d;--forest:#173e31;--mint:#c9f277;--paper:#f7f7f2;--line:#dfe4dd;--muted:#6f7a74}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:Arial,"Yu Gothic",sans-serif}button,input{font:inherit}.top{height:70px;display:grid;grid-template-columns:250px minmax(240px,500px) 1fr;align-items:center;gap:24px;padding:0 24px;border-bottom:1px solid var(--line);background:#fbfcf8}.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.08em}.mark{width:34px;height:34px;border-radius:50% 50% 50% 12px;background:var(--forest);color:var(--mint);display:grid;place-items:center;font-family:Georgia}.search{height:42px;border:1px solid #d4dad3;border-radius:12px;background:white;display:flex;align-items:center;padding:0 14px}.search input{border:0;outline:0;width:100%;background:transparent}.tag{justify-self:end;font-size:11px;color:var(--muted);background:#eef1eb;padding:7px 10px;border-radius:16px}.work{height:calc(100vh - 70px);display:grid;grid-template-columns:1fr 420px}.mapwrap{position:relative}.map{height:100%;filter:saturate(.5)}.maptitle,.layers{position:absolute;z-index:500;background:#fbfcf8ed;backdrop-filter:blur(8px);border-radius:12px;box-shadow:0 8px 24px #173e3125}.maptitle{left:22px;top:20px;padding:12px 15px;font-weight:800;font-size:13px}.maptitle small{display:block;color:var(--muted);font-weight:400;margin-top:4px}.layers{left:22px;bottom:24px;padding:13px 15px;font-size:11px}.layers b{display:block;margin-bottom:9px}.layers label{display:block;margin:7px 0}.layers input{accent-color:var(--forest);margin-right:7px}.panel{overflow:auto;border-left:1px solid var(--line);padding:28px 30px 50px;background:#fbfcf8}.eyebrow{font-size:9px;color:var(--muted);letter-spacing:.15em;font-weight:800}.title{display:flex;justify-content:space-between;align-items:start}.title h1{font-size:29px;margin:14px 0 6px}.title p{font-size:11px;color:var(--muted);margin:0}.score{margin:22px 0;background:var(--forest);color:white;border-radius:14px;padding:16px;display:flex;align-items:center;gap:15px}.ring{width:64px;height:64px;border:5px solid var(--mint);border-radius:50%;display:grid;place-items:center;font:700 23px Georgia}.score div:last-child{font-size:13px;font-weight:700}.score small{display:block;color:#b7c6be;font-size:9px;margin-top:7px}.section{border-top:1px solid var(--line);padding:20px 0}.section h2{font-size:13px;margin:0 0 14px}.price{font:700 39px Georgia}.price small{font:700 11px Arial}.change{float:right;color:#40724a;background:#e1f1d7;padding:5px 8px;border-radius:12px;font-size:10px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.stats div{background:#eff2ed;border-radius:8px;padding:11px}.stats span,dt{display:block;color:var(--muted);font-size:9px}.stats b{font-size:12px}.data{margin:0}.data div{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dotted var(--line)}dd{margin:0;font-size:11px;font-weight:700;text-align:right}dt{font-size:11px}.note{background:#edf1e8;border-left:3px solid var(--forest);padding:14px;font:12px/1.8 Georgia,"Yu Mincho",serif}.notice{font-size:8px;line-height:1.7;color:#8b958f;margin-top:16px}.gifu-marker{width:44px;height:44px;border:3px solid white;border-radius:50% 50% 50% 8px;background:var(--forest);color:white;transform:rotate(-45deg);display:grid;place-items:center;box-shadow:0 5px 15px #173e3166}.gifu-marker span{transform:rotate(45deg);font-size:11px;font-weight:800}.gifu-marker.on{background:var(--mint);color:var(--forest);border-color:var(--forest)}@media(max-width:850px){html,body{overflow:auto}.top{grid-template-columns:auto 1fr;height:62px;padding:0 14px}.brand>span:last-child,.tag{display:none}.work{display:flex;flex-direction:column;height:auto}.mapwrap{height:52vh;min-height:390px}.panel{overflow:visible;border:0;padding:22px 18px}}
  </style>
</head>
<body>
  <header class="top"><div class="brand"><span class="mark">G</span><span>GIFU SCOUT</span></div><div class="search"><input id="search" placeholder="町名・駅名で検索" aria-label="町名・駅名で検索"></div><span class="tag">岐阜市 β版</span></header>
  <main class="work"><div class="mapwrap"><div id="map" class="map"></div><div class="maptitle">岐阜市マーケットマップ<small>5エリアを表示中</small></div><div class="layers"><b>表示レイヤー</b><label><input type="checkbox" checked>土地相場</label><label><input type="checkbox">浸水想定</label></div></div><aside class="panel"><div class="eyebrow">AREA REPORT · DEMO DATA</div><div class="title"><div><h1 id="name"></h1><p id="address"></p></div></div><div class="score"><div class="ring" id="score"></div><div>土地ポテンシャル<small>相場・交通・人口動向から算出</small></div></div><section class="section"><h2>土地価格 <span class="change" id="change"></span></h2><div class="price"><span id="price"></span><small> 万円 / 坪</small></div><div class="stats"><div><span>直近の取引</span><b id="trades"></b></div><div><span>取引中央値</span><b id="median"></b></div></div></section><section class="section"><h2>土地・建築</h2><dl class="data"><div><dt>用途地域</dt><dd id="use"></dd></div><div><dt>建ぺい率 / 容積率</dt><dd id="coverage"></dd></div><div><dt>地形</dt><dd>平坦</dd></div></dl></section><section class="section"><h2>防災・アクセス</h2><dl class="data"><div><dt>洪水浸水想定</dt><dd id="flood"></dd></div><div><dt>最寄り</dt><dd id="station"></dd></div><div><dt>徒歩</dt><dd id="walk"></dd></div><div><dt>人口推移（5年）</dt><dd id="population"></dd></div></dl></section><div class="note" id="note"></div><p class="notice">※ 本画面の数値はUI検証用の参考データです。不動産取引の判断には公的資料・専門家の確認をご利用ください。</p></aside></main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
  const areas=[
    {name:'岐阜駅南口',address:'岐阜市加納清水町付近',pos:[35.4086,136.7567],price:46.8,change:3.2,trades:18,use:'商業地域',coverage:'80% / 400%',flood:'0.5〜3.0m',station:'JR岐阜駅',walk:3,population:1.8,score:88,note:'再開発と駅近需要が価格を下支え。賃貸・店舗の双方を検討しやすいエリアです。'},
    {name:'柳ケ瀬',address:'岐阜市徹明通付近',pos:[35.4198,136.7591],price:31.4,change:2.4,trades:12,use:'商業地域',coverage:'80% / 500%',flood:'0.5〜3.0m',station:'名鉄岐阜駅',walk:13,population:3.7,score:81,note:'中心市街地の住宅供給が進行中。徒歩圏の生活利便性が高いエリアです。'},
    {name:'長良',address:'岐阜市長良福光付近',pos:[35.4454,136.7747],price:22.9,change:1.1,trades:9,use:'第一種中高層住居専用地域',coverage:'60% / 200%',flood:'0.5〜3.0m',station:'岐阜バス 長良北町',walk:4,population:-1.2,score:76,note:'教育・自然環境のバランスが良く、戸建て需要が安定している住宅地です。'},
    {name:'岐阜公園',address:'岐阜市大宮町付近',pos:[35.4343,136.7713],price:20.6,change:.8,trades:6,use:'第一種住居地域',coverage:'60% / 200%',flood:'0.5m未満',station:'岐阜公園歴史博物館前',walk:2,population:-2,score:73,note:'金華山に近く、観光と住環境が共存。景観を活かした活用に向きます。'},
    {name:'鏡島',address:'岐阜市鏡島南付近',pos:[35.4118,136.7226],price:18.7,change:-.3,trades:8,use:'第一種住居地域',coverage:'60% / 200%',flood:'0.5〜3.0m',station:'西岐阜駅',walk:12,population:.4,score:69,note:'幹線道路と鉄道の両方へアクセスしやすい、実需中心の住宅エリアです。'}];
  const map=L.map('map',{zoomControl:false}).setView([35.424,136.755],13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);L.control.zoom({position:'bottomright'}).addTo(map);let current=0;const markers=[];
  function icon(i){return L.divIcon({className:'',html:`<div class="gifu-marker ${i===current?'on':''}"><span>${areas[i].score}</span></div>`,iconSize:[48,48],iconAnchor:[24,24]})}
  function show(i){current=i;const a=areas[i];markers.forEach((m,j)=>m.setIcon(icon(j)));['name','address','score','price','trades','use','coverage','flood','station','note'].forEach(k=>document.getElementById(k).textContent=a[k]);document.getElementById('change').textContent=(a.change>=0?'+':'')+a.change+'%';document.getElementById('trades').textContent=a.trades+'件';document.getElementById('median').textContent='坪 '+(a.price*.94).toFixed(1)+'万円';document.getElementById('walk').textContent=a.walk+'分';document.getElementById('population').textContent=(a.population>=0?'+':'')+a.population+'%'}
  areas.forEach((a,i)=>{const m=L.marker(a.pos,{icon:icon(i)}).addTo(map).bindTooltip(a.name+'・坪 '+a.price+'万円');m.on('click mouseover',()=>show(i));markers.push(m)});show(0);document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.trim();const i=areas.findIndex(a=>(a.name+a.address+a.station).includes(q));if(q&&i>=0){show(i);map.panTo(areas[i].pos)}});
  </script>
</body></html>
