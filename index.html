<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GIFU SCOUT — 岐阜市の土地を、地図から読む</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{--ink:#16221d;--forest:#173e31;--mint:#c9f277;--paper:#f7f7f2;--line:#dfe4dd;--muted:#6f7a74}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:Arial,"Yu Gothic",sans-serif}button,input{font:inherit}.top{height:70px;display:grid;grid-template-columns:250px minmax(240px,500px) 1fr;align-items:center;gap:24px;padding:0 24px;border-bottom:1px solid var(--line);background:#fbfcf8}.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.08em}.mark{width:34px;height:34px;border-radius:50% 50% 50% 12px;background:var(--forest);color:var(--mint);display:grid;place-items:center;font-family:Georgia}.search{height:42px;border:1px solid #d4dad3;border-radius:12px;background:white;display:flex;align-items:center;padding:0 14px}.search input{border:0;outline:0;width:100%;background:transparent}.tag{justify-self:end;font-size:11px;color:var(--muted);background:#eef1eb;padding:7px 10px;border-radius:16px}.work{height:calc(100vh - 70px);display:grid;grid-template-columns:1fr 390px}.mapwrap{position:relative}.map{height:100%;filter:saturate(.55)}.maptitle,.layers,.legend{position:absolute;z-index:500;background:#fbfcf8ed;backdrop-filter:blur(8px);border-radius:12px;box-shadow:0 8px 24px #173e3125}.maptitle{left:22px;top:20px;padding:12px 15px;font-weight:800;font-size:13px}.maptitle small{display:block;color:var(--muted);font-weight:400;margin-top:4px}.layers{left:22px;bottom:24px;padding:13px 15px;font-size:11px}.layers b{display:block;margin-bottom:9px}.layers label{display:block;margin:7px 0}.layers input{accent-color:var(--forest);margin-right:7px}.legend{right:18px;top:20px;padding:9px 12px;font-size:10px;color:var(--muted)}.legend i{display:inline-block;width:13px;height:13px;border-radius:50%;vertical-align:-2px;margin:0 4px 0 10px}.panel{overflow:auto;border-left:1px solid var(--line);padding:28px 30px 50px;background:#fbfcf8}.eyebrow{font-size:9px;color:var(--muted);letter-spacing:.15em;font-weight:800}.title{display:flex;justify-content:space-between;align-items:start}.title h1{font-size:29px;margin:14px 0 6px}.title p{font-size:11px;color:var(--muted);margin:0}.score{margin:22px 0;background:var(--forest);color:white;border-radius:14px;padding:16px;display:flex;align-items:center;gap:15px}.ring{width:64px;height:64px;border:5px solid var(--mint);border-radius:50%;display:grid;place-items:center;font:700 23px Georgia}.score div:last-child{font-size:13px;font-weight:700}.score small{display:block;color:#b7c6be;font-size:9px;margin-top:7px}.section{border-top:1px solid var(--line);padding:20px 0}.section h2{font-size:13px;margin:0 0 14px}.price{font:700 39px Georgia}.price small{font:700 11px Arial}.change{float:right;color:#40724a;background:#e1f1d7;padding:5px 8px;border-radius:12px;font-size:10px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.stats div{background:#eff2ed;border-radius:8px;padding:11px}.stats span,dt{display:block;color:var(--muted);font-size:9px}.stats b{font-size:12px}.data{margin:0}.data div{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dotted var(--line)}dd{margin:0;font-size:11px;font-weight:700;text-align:right}dt{font-size:11px}.note{background:#edf1e8;border-left:3px solid var(--forest);padding:14px;font:12px/1.8 Georgia,"Yu Mincho",serif}.notice{font-size:8px;line-height:1.7;color:#8b958f;margin-top:16px}.gifu-marker{min-width:44px;height:30px;padding:0 7px;border:2px solid white;border-radius:9px;background:#27704e;color:white;display:grid;place-items:center;box-shadow:0 4px 13px #173e3155;white-space:nowrap}.gifu-marker.mid{background:#a5b63d;color:#142117}.gifu-marker.high{background:#e0803a}.gifu-marker span{font-size:10px;font-weight:800}.gifu-marker.on{background:var(--mint);color:var(--forest);border-color:var(--forest);transform:scale(1.16)}@media(max-width:850px){html,body{overflow:auto}.top{grid-template-columns:auto 1fr;height:62px;padding:0 14px}.brand>span:last-child,.tag{display:none}.work{display:flex;flex-direction:column;height:auto}.mapwrap{height:55vh;min-height:420px}.panel{overflow:visible;border:0;padding:22px 18px}.legend{display:none}}
  </style>
</head>
<body>
  <header class="top"><div class="brand"><span class="mark">G</span><span>GIFU SCOUT</span></div><div class="search"><input id="search" placeholder="町名・駅名で検索" aria-label="町名・駅名で検索"></div><span class="tag">岐阜市 β版</span></header>
  <main class="work"><div class="mapwrap"><div id="map" class="map"></div><div class="maptitle">岐阜市・町別土地価格マップ<small>24の町・駅周辺を表示中 — 数字は万円／坪</small></div><div class="legend">価格帯 <i style="background:#27704e"></i>〜20 <i style="background:#a5b63d"></i>20〜35 <i style="background:#e0803a"></i>35〜</div><div class="layers"><b>表示レイヤー</b><label><input type="checkbox" checked>町別の土地価格</label></div></div><aside class="panel"><div class="eyebrow">NEIGHBORHOOD REPORT · DEMO DATA</div><div class="title"><div><h1 id="name"></h1><p id="address"></p></div></div><div class="score"><div class="ring" id="score"></div><div>価格ポジション<small>岐阜市内の表示24地点で比較</small></div></div><section class="section"><h2>推定土地価格 <span class="change" id="change"></span></h2><div class="price"><span id="price"></span><small> 万円 / 坪</small></div><div class="stats"><div><span>参考取引件数</span><b id="trades"></b></div><div><span>参考中央値</span><b id="median"></b></div></div></section><section class="section"><h2>地域情報</h2><dl class="data"><div><dt>用途地域</dt><dd id="use"></dd></div><div><dt>建ぺい率 / 容積率</dt><dd id="coverage"></dd></div><div><dt>最寄り交通</dt><dd id="station"></dd></div></dl></section><div class="note" id="note"></div><p class="notice">※ 数値はエリア比較のUI検証用に作成した参考値です。同じ町内でも接道・形状・用途地域などで価格は大きく異なります。売買判断には公示地価・取引価格情報および専門家の査定をご利用ください。</p></aside></main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
  const areas=[
    ['岐阜駅北口','橋本町・神田町',[35.4118,136.7584],52.0,3.6,22,'商業地域','80% / 500%','JR・名鉄岐阜駅',96,'駅前再開発と商業集積により、市内で最も高い価格帯のひとつです。'],
    ['岐阜駅南口','加納清水町',[35.4086,136.7567],46.8,3.2,18,'商業地域','80% / 400%','JR岐阜駅',91,'駅近需要が価格を下支え。住宅・店舗の双方を検討しやすい地域です。'],
    ['金町','金町・蕪城町',[35.4175,136.7580],39.5,2.7,14,'商業地域','80% / 500%','名鉄岐阜駅',84,'駅と柳ケ瀬の中間に位置し、中心市街地の利便性が高い地域です。'],
    ['柳ケ瀬','徹明通・若宮町',[35.4206,136.7588],31.4,2.4,12,'商業地域','80% / 500%','柳ケ瀬バス停',74,'中心市街地の住宅供給が進行中。徒歩圏の生活利便性が魅力です。'],
    ['加納','加納城南通・加納本町',[35.4018,136.7604],28.6,1.9,15,'第一種住居地域','60% / 200%','JR岐阜駅',68,'駅南の成熟した住宅地。学校や生活施設へのアクセスに優れます。'],
    ['梅林','金園町・梅林西町',[35.4218,136.7770],25.8,1.2,10,'近隣商業地域','80% / 300%','田神駅',60,'中心部に近く、戸建てと小規模店舗が混在する地域です。'],
    ['早田','早田東町・早田栄町',[35.4368,136.7540],24.1,1.0,9,'第二種住居地域','60% / 200%','岐阜赤十字病院前',56,'中心市街地への距離と住宅地としての落ち着きが両立しています。'],
    ['長良福光','長良福光・長良丘',[35.4454,136.7747],22.9,1.1,9,'第一種中高層住居専用地域','60% / 200%','長良北町バス停',53,'教育・自然環境のバランスが良く、戸建て需要が安定しています。'],
    ['岐阜公園','大宮町・御手洗',[35.4343,136.7713],20.6,.8,6,'第一種住居地域','60% / 200%','岐阜公園前',48,'金華山に近く、観光と住環境が共存する地域です。'],
    ['金華','白木町・上大久和町',[35.4294,136.7730],19.8,.5,5,'第一種住居地域','60% / 200%','本町一丁目バス停',45,'歴史的な街並みが残り、静かな住環境に特色があります。'],
    ['忠節','忠節町・島栄町',[35.4310,136.7442],21.7,.7,8,'近隣商業地域','80% / 300%','忠節バス停',51,'バス交通と沿道商業が利用しやすい住宅エリアです。'],
    ['島','北島・菅生',[35.4315,136.7285],19.4,.6,11,'第二種中高層住居専用地域','60% / 200%','島小学校前',44,'商業施設が点在し、車移動を中心とした生活利便性があります。'],
    ['則武','則武中・則武西',[35.4438,136.7420],18.9,.9,13,'第二種住居地域','60% / 200%','則武バス停',43,'大型商業施設に近く、ファミリー層の住宅需要が見込まれます。'],
    ['鷺山','鷺山東・鷺山新町',[35.4525,136.7510],17.5,.4,8,'第一種低層住居専用地域','50% / 80%','青山中学校南',39,'低層の戸建てが中心で、落ち着いた住宅環境です。'],
    ['長良東','長良東・長良井田',[35.4495,136.7900],18.4,.6,7,'第一種低層住居専用地域','50% / 80%','長良医療センター口',41,'長良川北側の郊外住宅地で、ゆとりある敷地が多い地域です。'],
    ['岩野田','岩崎・粟野東',[35.4750,136.7775],13.2,-.2,7,'第一種低層住居専用地域','50% / 80%','岩崎バス停',29,'北部の郊外住宅地。土地面積を確保しやすい価格帯です。'],
    ['日野','日野南・日野東',[35.4315,136.8150],13.8,.1,9,'第一種住居地域','60% / 200%','日野橋バス停',31,'国道156号へのアクセスが良く、戸建て中心の地域です。'],
    ['芥見','芥見南山・芥見長山',[35.4450,136.8580],10.8,-.5,8,'第一種低層住居専用地域','50% / 80%','芥見南山バス停',24,'東部の郊外住宅地で、比較的手頃な土地価格が特徴です。'],
    ['茜部','茜部中島・茜部菱野',[35.3895,136.7470],18.1,.8,14,'準工業地域','60% / 200%','茜部市営アパート前',41,'国道21号に近く、住宅・事業用地の双方で需要があります。'],
    ['鶉','中鶉・東鶉',[35.3800,136.7310],15.6,.3,12,'第二種住居地域','60% / 200%','岐阜聖徳学園高校前',35,'南部の平坦な住宅地で、車利用の生活に適しています。'],
    ['六条','六条南・六条江東',[35.3970,136.7395],22.2,1.4,16,'第二種住居地域','60% / 200%','岐阜精機前',52,'中心部と国道21号の双方へアクセスしやすい地域です。'],
    ['市橋','市橋・薮田南',[35.4025,136.7240],24.8,1.8,17,'第二種住居地域','60% / 200%','西岐阜駅',58,'西岐阜駅と県庁に近く、安定した住宅需要が見込まれます。'],
    ['西岐阜','西荘・今嶺',[35.4052,136.7230],23.6,1.6,15,'第一種住居地域','60% / 200%','JR西岐阜駅',55,'鉄道利便性と落ち着いた住環境のバランスが良い地域です。'],
    ['鏡島','鏡島南・鏡島精華',[35.4118,136.7085],18.7,-.3,8,'第一種住居地域','60% / 200%','西岐阜駅',42,'幹線道路と鉄道の両方へアクセスしやすい実需中心の地域です。']
  ].map(a=>({name:a[0],address:'岐阜市'+a[1]+'付近',pos:a[2],price:a[3],change:a[4],trades:a[5],use:a[6],coverage:a[7],station:a[8],score:a[9],note:a[10]}));
  const map=L.map('map',{zoomControl:false}).setView([35.423,136.762],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);L.control.zoom({position:'bottomright'}).addTo(map);let current=0;const markers=[];
  function icon(i){const p=areas[i].price,band=p>=35?'high':p>=20?'mid':'';return L.divIcon({className:'',html:`<div class="gifu-marker ${band} ${i===current?'on':''}"><span>${p.toFixed(1)}</span></div>`,iconSize:[48,32],iconAnchor:[24,16]})}
  function show(i){current=i;const a=areas[i];markers.forEach((m,j)=>m.setIcon(icon(j)));['name','address','score','price','trades','use','coverage','station','note'].forEach(k=>document.getElementById(k).textContent=a[k]);document.getElementById('change').textContent=(a.change>=0?'+':'')+a.change+'%';document.getElementById('trades').textContent=a.trades+'件';document.getElementById('median').textContent='坪 '+(a.price*.94).toFixed(1)+'万円'}
  areas.forEach((a,i)=>{const m=L.marker(a.pos,{icon:icon(i)}).addTo(map).bindTooltip(a.name+'・坪 '+a.price+'万円');m.on('click mouseover',()=>show(i));markers.push(m)});show(0);document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.trim();const i=areas.findIndex(a=>(a.name+a.address+a.station).includes(q));if(q&&i>=0){show(i);map.panTo(areas[i].pos)}});
  </script>
</body></html>
